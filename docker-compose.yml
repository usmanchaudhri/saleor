# Local all-in-Docker stack: Saleor API + worker + dashboard + storefront.
# Usage: docker compose up --build
# First-time sample data: docker compose run --rm api python manage.py populatedb --createsuperuser
#
# Storefront: ../storefront (sibling repo). Public API URL for the browser is :8001; SSR uses http://api:8000/graphql/ inside the stack.

x-saleor-env: &saleor-env
  DATABASE_URL: postgres://saleor:saleor@db:5432/saleor
  CACHE_URL: redis://cache:6379/0
  CELERY_BROKER_URL: redis://cache:6379/1
  SECRET_KEY: ${SECRET_KEY:-changeme}
  DEBUG: "True"
  # Django ALLOWED_HOSTS must include the API service hostname for SSR from the storefront container.
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,api}
  ALLOWED_CLIENT_HOSTS: localhost,127.0.0.1,api
  HTTP_IP_FILTER_ALLOW_LOOPBACK_IPS: "True"
  DEFAULT_FROM_EMAIL: noreply@example.com
  EMAIL_URL: smtp://mailpit:1025
  DASHBOARD_URL: http://localhost:9000/
  DEFAULT_CHANNEL_SLUG: default-channel
  # Must match the host port mapped to the API (see api ports). Otherwise media/thumbnail URLs point at :8000 and images break in the browser.
  PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8001/}


services:
  api:
    build: .
    # Published ports: docker-compose.override.yml (local) or docker-compose.prod.yml (production).
    environment:
      <<: *saleor-env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    command: >
      sh -c "python manage.py migrate --noinput &&
             exec uvicorn saleor.asgi:application --host=0.0.0.0 --port=8000 --workers=2 --lifespan=on --ws=none --no-server-header --no-access-log --timeout-keep-alive=35 --timeout-graceful-shutdown=30 --limit-max-requests=10000"
    volumes:
      - saleor-media:/app/media
    healthcheck:
      # /health/ is handled in ASGI (see saleor/asgi/health_check.py), not Django — works with
      # SECURE_SSL_REDIRECT and production ALLOWED_HOSTS (Host: api.kayapure.com only).
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/health/\")"',
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 120s
    restart: unless-stopped

  worker:
    build: .
    environment:
      <<: *saleor-env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
      api:
        condition: service_healthy
    command: celery --app saleor.celeryconf:app worker -E
    volumes:
      - saleor-media:/app/media
    restart: unless-stopped

  scheduler:
    build: .
    environment:
      <<: *saleor-env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
      api:
        condition: service_healthy
    command: celery --app saleor.celeryconf:app beat --scheduler saleor.schedulers.schedulers.DatabaseScheduler
    restart: unless-stopped

  db:
    image: docker.io/library/postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: saleor
      POSTGRES_PASSWORD: saleor
      POSTGRES_DB: saleor
    volumes:
      - saleor-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saleor -d saleor"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cache:
    image: docker.io/valkey/valkey:8.1-alpine
    ports:
      - "6379:6379"
    volumes:
      - saleor-cache:/data
    restart: unless-stopped

  mailpit:
    image: docker.io/axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  # Local checkout (sibling repo). Previous image:
  #   ghcr.io/saleor/saleor-dashboard:3.22
  # Align dashboard git branch with your API when troubleshooting mismatches.
  dashboard:
    build:
      context: ../saleor-dashboard
      dockerfile: Dockerfile
      args:
        # Baked into the Vite build; browser calls this GraphQL endpoint.
        API_URL: http://localhost:8001/graphql/
    # Published ports: docker-compose.override.yml (local) or docker-compose.prod.yml (production).
    environment:
      API_URL: http://localhost:8001/graphql/
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # Next.js dev server (Paper storefront). Uses SALEOR_API_URL for SSR inside the stack; browser uses localhost:8001.
  # Published on host :3001 so another app (e.g. Vite on [::1]:3000) does not steal http://localhost:3000 — that name often resolves to IPv6 first on macOS.
  # For a production image, build ../storefront with the root Dockerfile while Saleor is reachable (see storefront/Dockerfile).
  storefront:
    build:
      context: ../storefront
      dockerfile: Dockerfile.dev
    # Published ports: docker-compose.override.yml (local) or docker-compose.prod.yml (production).
    environment:
      NEXT_PUBLIC_SALEOR_API_URL: http://localhost:8001/graphql/
      NEXT_PUBLIC_STOREFRONT_URL: http://localhost:3001
      NEXT_PUBLIC_DEFAULT_CHANNEL: default-channel
      SALEOR_API_URL: http://api:8000/graphql/
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  saleor-db:
  saleor-cache:
  saleor-media:
